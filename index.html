<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Shangri-La</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: sans-serif; }
  canvas { display: block; }

  #crosshair {
    position: fixed;
    top: 50%; left: 50%;
    width: 6px; height: 6px;
    background: white;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    opacity: 0.8;
  }

  #intro {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    z-index: 10;
  }
  #intro h1 { font-size: 2rem; margin-bottom: 1rem; }
  #intro p { opacity: 0.8; }
</style>
</head>
<body>

<div id="intro">
  <h1>Shangri-La</h1>
  <p>Clique pour entrer dans la vallée<br>WASD pour marcher, souris pour regarder</p>
</div>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/OBJLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/MTLLoader.js"></script>
<script>

// ---------- SCÈNE DE BASE ----------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x88bbdd);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.7, 0); // 1.7 = hauteur des yeux du joueur

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------- LUMIÈRE ----------
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffffff, 0.8);
sun.position.set(50, 80, 30);
scene.add(sun);

// ---------- TERRAIN ----------
const groundGeo = new THREE.PlaneGeometry(200, 200, 50, 50);
groundGeo.rotateX(-Math.PI / 2); // on couche le plan à plat

// on ajoute un peu de relief aléatoire pour que ce ne soit pas plat comme une table
const posAttr = groundGeo.attributes.position;
for (let i = 0; i < posAttr.count; i++) {
  const x = posAttr.getX(i);
  const z = posAttr.getZ(i);
  const height = Math.sin(x * 0.05) * 2 + Math.cos(z * 0.05) * 2;
  posAttr.setY(i, height);
}
groundGeo.computeVertexNormals();

const groundMat = new THREE.MeshStandardMaterial({ color: 0x6fae6f });
const ground = new THREE.Mesh(groundGeo, groundMat);
scene.add(ground);

// fonction pour connaître la hauteur du sol à une position x,z donnée
// (même formule que celle utilisée pour générer le relief)
function getGroundHeight(x, z) {
  return Math.sin(x * 0.05) * 2 + Math.cos(z * 0.05) * 2;
}

// ---------- DÉPLACEMENT FPS ----------
let yaw = 0;   // rotation horizontale (gauche/droite)
let pitch = 0; // rotation verticale (haut/bas)

const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

const intro = document.getElementById('intro');
intro.addEventListener('click', () => {
  renderer.domElement.requestPointerLock();
});

document.addEventListener('pointerlockchange', () => {
  intro.style.display = document.pointerLockElement ? 'none' : 'flex';
});

document.addEventListener('mousemove', (e) => {
  if (!document.pointerLockElement) return;
  const sensitivity = 0.002;
  yaw -= e.movementX * sensitivity;
  pitch -= e.movementY * sensitivity;
  pitch = Math.max(-Math.PI / 2 + 0.01, Math.min(Math.PI / 2 - 0.01, pitch)); // limite pour pas faire de saut périlleux
});

const playerPos = new THREE.Vector3(0, 0, 0);
const speed = 5; // unités par seconde

const clock = new THREE.Clock();

function updateMovement(delta) {
  // direction "avant" et "droite" calculées à partir du yaw (la rotation horizontale de la caméra)
  const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));

  const move = new THREE.Vector3();
  if (keys['KeyW'] || keys['ArrowUp'])    move.add(forward);
  if (keys['KeyS'] || keys['ArrowDown'])  move.sub(forward);
  if (keys['KeyD'] || keys['ArrowRight']) move.add(right);
  if (keys['KeyA'] || keys['ArrowLeft'])  move.sub(right);

  if (move.lengthSq() > 0) {
    move.normalize().multiplyScalar(speed * delta);
    playerPos.add(move);
  }

  // le perso colle au sol : on prend la hauteur du terrain + hauteur des yeux
  const groundY = getGroundHeight(playerPos.x, playerPos.z);
  camera.position.set(playerPos.x, groundY + 1.7, playerPos.z);

  // on applique la rotation de la caméra (ordre YXZ pour un comportement FPS correct)
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;
}

// ---------- CHARGEMENT DES MATÉRIAUX ET DE L'OBJET ----------
const mtlLoader = new THREE.MTLLoader();
const objLoader = new THREE.OBJLoader();

// 1. On charge d'abord le fichier de matériaux (.mtl)
mtlLoader.load('assets/obj.mtl', (materials) => {
    materials.preload(); // On prépare les matériaux
    
    // 2. On donne ces matériaux à l'OBJLoader
    objLoader.setMaterials(materials);

    // 3. On charge enfin le fichier 3D (.obj)
    objLoader.load('assets/tinker.obj', (model) => {

        // --- Un seul arbre spécifique (optionnel, comme dans ton code) ---
        const singleTree = model.clone();
        const xSpec = 20;
        const zSpec = -10;
        singleTree.scale.set(0.5, 0.5, 0.5);
        singleTree.position.set(xSpec, getGroundHeight(xSpec, zSpec), zSpec);
        scene.add(singleTree);

        // --- Génération de la forêt (200 arbres) ---
        for(let i = 0; i < 200; i++) {
            const tree = model.clone();

            const x = (Math.random() - 0.5) * 180;
            const z = (Math.random() - 0.5) * 180;

            tree.position.set(
                x,
                getGroundHeight(x, z),
                z
            );

            // Taille et rotation aléatoires pour faire plus naturel
            const s = 0.4 + Math.random() * 0.8;
            tree.scale.set(s, s, s);
            tree.rotation.y = Math.random() * Math.PI * 2;

            scene.add(tree);
        }
    });
});

// ---------- BOUCLE DE RENDU ----------
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  updateMovement(delta);
  renderer.render(scene, camera);
}
animate();

</script>
</body>
</html>

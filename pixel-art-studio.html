<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pixel Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#161512;
    --panel:#211f1a;
    --panel-2:#2a2721;
    --border:#3a352c;
    --text:#f4ecd8;
    --text-dim:#a89e8a;
    --orange:#e8792c;
    --orange-dim:#a85a20;
    --green:#5fae6b;
    --red:#c1543f;
    font-family:'Outfit',sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    height:100vh; overflow:hidden; user-select:none;
  }
  h1,h2,.brand{font-family:'Lilita One',cursive; letter-spacing:.5px;}
  button{
    font-family:'Outfit',sans-serif; font-weight:600; cursor:pointer;
    background:var(--panel-2); color:var(--text); border:1px solid var(--border);
    border-radius:8px; padding:7px 10px; font-size:13px;
  }
  button:hover{border-color:var(--orange);}
  button.active{background:var(--orange); color:#1b1200; border-color:var(--orange);}
  button:disabled{opacity:.35; cursor:default;}
  input[type=number], input[type=text]{
    background:var(--bg); color:var(--text); border:1px solid var(--border);
    border-radius:6px; padding:5px 7px; font-family:'Outfit',sans-serif; font-size:13px; width:70px;
  }
  input[type=range]{accent-color:var(--orange);}
  .app{display:flex; flex-direction:column; height:100vh;}

  /* TOP BAR */
  .topbar{
    display:flex; align-items:center; gap:8px; padding:8px 14px;
    background:var(--panel); border-bottom:1px solid var(--border); flex-wrap:wrap;
  }
  .topbar .brand{color:var(--orange); font-size:20px; margin-right:10px;}
  .topbar .sep{width:1px; height:22px; background:var(--border); margin:0 4px;}
  .spacer{flex:1;}

  /* MAIN LAYOUT */
  .main{flex:1; display:flex; overflow:hidden;}
  .side{
    width:210px; background:var(--panel); border-right:1px solid var(--border);
    padding:12px; overflow-y:auto; flex-shrink:0;
  }
  .side.right{border-right:none; border-left:1px solid var(--border);}
  .side h3{margin:0 0 8px; font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); font-family:'Outfit'; font-weight:700;}
  .tool-grid{display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:14px;}
  .tool-grid button{padding:10px 4px; font-size:12px; display:flex; flex-direction:column; align-items:center; gap:3px;}
  .tool-grid button svg{width:18px; height:18px;}

  .row{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; gap:6px;}
  .row label{font-size:12px; color:var(--text-dim);}

  .palette{display:grid; grid-template-columns:repeat(6,1fr); gap:5px; margin-bottom:8px;}
  .swatch{width:24px; height:24px; border-radius:5px; border:1px solid var(--border); cursor:pointer;}
  .swatch.selected{outline:2px solid var(--orange); outline-offset:1px;}
  .current-color{display:flex; align-items:center; gap:8px; margin-bottom:10px;}
  #colorPicker{width:40px; height:34px; border:1px solid var(--border); border-radius:6px; background:none; padding:0; cursor:pointer;}

  /* CANVAS AREA */
  .canvas-wrap{
    flex:1; display:flex; align-items:center; justify-content:center; position:relative;
    overflow:auto; background:
      linear-gradient(45deg,#1c1a16 25%,transparent 25%),
      linear-gradient(-45deg,#1c1a16 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,#1c1a16 75%),
      linear-gradient(-45deg,transparent 75%,#1c1a16 75%);
    background-size:20px 20px;
    background-position:0 0,0 10px,10px -10px,-10px 0px;
    background-color:#141210;
  }
  #displayCanvas{
    image-rendering:pixelated; image-rendering:crisp-edges;
    box-shadow:0 0 0 2px var(--border), 0 8px 30px rgba(0,0,0,.5);
    cursor:crosshair;
  }
  .zoom-bar{
    position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
    display:flex; gap:6px; background:var(--panel); padding:6px 8px; border-radius:10px;
    border:1px solid var(--border); align-items:center;
  }
  .zoom-bar span{font-size:12px; color:var(--text-dim); min-width:44px; text-align:center;}

  /* LAYERS */
  .layer{
    background:var(--panel-2); border:1px solid var(--border); border-radius:8px;
    padding:7px; margin-bottom:6px; cursor:pointer;
  }
  .layer.active{border-color:var(--orange);}
  .layer-top{display:flex; align-items:center; gap:6px;}
  .layer-thumb{width:30px; height:30px; border:1px solid var(--border); border-radius:4px; background:
      linear-gradient(45deg,#2a2721 25%,transparent 25%),linear-gradient(-45deg,#2a2721 25%,transparent 25%);
      background-size:8px 8px; flex-shrink:0;}
  .layer-name{flex:1; font-size:12px; background:none; border:none; color:var(--text); padding:2px; width:100%;}
  .layer-name:focus{outline:1px solid var(--orange); border-radius:3px;}
  .eye-btn{padding:4px 6px; font-size:13px; border-radius:5px;}
  .layer-actions{display:flex; gap:4px; margin-top:6px;}
  .layer-actions button{flex:1; padding:4px; font-size:11px;}
  .opacity-row{display:flex; align-items:center; gap:6px; margin-top:5px;}
  .opacity-row input{flex:1;}
  .opacity-row span{font-size:10px; color:var(--text-dim); width:28px;}

  /* MODAL */
  .modal-bg{
    position:fixed; inset:0; background:rgba(0,0,0,.65); display:flex; align-items:center; justify-content:center;
    z-index:100;
  }
  .modal{
    background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:22px 26px;
    width:340px; max-width:90vw;
  }
  .modal h2{margin:0 0 4px; color:var(--orange); font-size:22px;}
  .modal p{color:var(--text-dim); font-size:12px; margin:0 0 16px;}
  .modal .row2{display:flex; gap:10px; margin-bottom:14px;}
  .modal .field{flex:1;}
  .modal .field label{display:block; font-size:11px; color:var(--text-dim); margin-bottom:4px;}
  .modal .field input{width:100%;}
  .presets{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px;}
  .presets button{padding:6px 10px; font-size:11px;}
  .modal-actions{display:flex; justify-content:flex-end; gap:8px;}
  .modal-actions .primary{background:var(--orange); color:#1b1200; border-color:var(--orange);}
  .anchor-grid{display:grid; grid-template-columns:repeat(3,26px); gap:4px; margin:6px 0 14px;}
  .anchor-grid button{width:26px; height:26px; padding:0;}
  .mode-toggle{display:flex; gap:6px; margin-bottom:14px;}
  .mode-toggle button{flex:1;}
  .hidden{display:none !important;}
  ::-webkit-scrollbar{width:8px;} ::-webkit-scrollbar-thumb{background:var(--border); border-radius:4px;}
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <span class="brand">🎨 Pixel Studio</span>
    <div class="sep"></div>
    <button id="btnNew">🆕 Nouveau</button>
    <button id="btnResize">📐 Redimensionner</button>
    <button id="btnImport">🖼️ Importer image</button>
    <input type="file" id="fileInput" accept="image/*" class="hidden">
    <div class="sep"></div>
    <button id="btnUndo">↩️ Annuler</button>
    <button id="btnRedo">↪️ Refaire</button>
    <div class="spacer"></div>
    <select id="exportScale" title="Échelle export">
      <option value="1">1x</option>
      <option value="2">2x</option>
      <option value="4" selected>4x</option>
      <option value="8">8x</option>
      <option value="16">16x</option>
    </select>
    <button id="btnExport">💾 Exporter PNG</button>
  </div>

  <div class="main">
    <!-- LEFT: TOOLS -->
    <div class="side">
      <h3>Outils</h3>
      <div class="tool-grid" id="toolGrid">
        <button data-tool="pencil" class="active">✏️<span>Crayon</span></button>
        <button data-tool="eraser">🧽<span>Gomme</span></button>
        <button data-tool="bucket">🪣<span>Seau</span></button>
        <button data-tool="eyedropper">💧<span>Pipette</span></button>
        <button data-tool="line">📏<span>Ligne</span></button>
        <button data-tool="rect">⬛<span>Rectangle</span></button>
        <button data-tool="ellipse">⭕<span>Ellipse</span></button>
      </div>

      <div class="row" id="filledRow">
        <label>Rempli</label>
        <input type="checkbox" id="filledCheck">
      </div>

      <h3>Taille du pinceau</h3>
      <div class="row">
        <input type="range" id="brushSize" min="1" max="10" value="1" style="flex:1">
        <span id="brushSizeLabel" style="font-size:12px; width:20px;">1</span>
      </div>

      <h3>Couleur</h3>
      <div class="current-color">
        <input type="color" id="colorPicker" value="#e8792c">
        <div style="font-size:11px; color:var(--text-dim);">Couleur active</div>
      </div>
      <div class="palette" id="palette"></div>

      <h3>Affichage</h3>
      <div class="row">
        <label>Grille</label>
        <input type="checkbox" id="gridToggle" checked>
      </div>
    </div>

    <!-- CENTER: CANVAS -->
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="displayCanvas"></canvas>
      <div class="zoom-bar">
        <button id="zoomOut">➖</button>
        <span id="zoomLabel">100%</span>
        <button id="zoomIn">➕</button>
        <button id="zoomFit">Ajuster</button>
      </div>
    </div>

    <!-- RIGHT: LAYERS -->
    <div class="side right">
      <h3>Calques</h3>
      <div id="layerList"></div>
      <button id="addLayerBtn" style="width:100%; margin-top:6px;">➕ Nouveau calque</button>
    </div>
  </div>
</div>

<!-- MODAL: NEW CANVAS -->
<div class="modal-bg" id="newModal">
  <div class="modal">
    <h2>Nouveau canevas</h2>
    <p>Choisis la taille de ton image en pixels. Tu pourras la redimensionner plus tard.</p>
    <div class="presets" id="newPresets">
      <button data-w="16" data-h="16">16×16</button>
      <button data-w="32" data-h="32">32×32</button>
      <button data-w="64" data-h="64">64×64</button>
      <button data-w="128" data-h="128">128×128</button>
      <button data-w="256" data-h="256">256×256</button>
    </div>
    <div class="row2">
      <div class="field"><label>Largeur (px)</label><input type="number" id="newW" value="32" min="1" max="1024"></div>
      <div class="field"><label>Hauteur (px)</label><input type="number" id="newH" value="32" min="1" max="1024"></div>
    </div>
    <div class="modal-actions">
      <button class="primary" id="createCanvasBtn">Créer</button>
    </div>
  </div>
</div>

<!-- MODAL: RESIZE -->
<div class="modal-bg hidden" id="resizeModal">
  <div class="modal">
    <h2>Redimensionner</h2>
    <p>Étire le contenu ou recadre sans le déformer.</p>
    <div class="mode-toggle">
      <button class="active" id="modeStretch">Étirer</button>
      <button id="modeCrop">Recadrer</button>
    </div>
    <div class="row2">
      <div class="field"><label>Largeur (px)</label><input type="number" id="resizeW" min="1" max="1024"></div>
      <div class="field"><label>Hauteur (px)</label><input type="number" id="resizeH" min="1" max="1024"></div>
    </div>
    <div id="anchorWrap" class="hidden">
      <label style="font-size:11px; color:var(--text-dim);">Point d'ancrage</label>
      <div class="anchor-grid" id="anchorGrid">
        <button data-a="nw"></button><button data-a="n"></button><button data-a="ne"></button>
        <button data-a="w"></button><button data-a="c" class="active"></button><button data-a="e"></button>
        <button data-a="sw"></button><button data-a="s"></button><button data-a="se"></button>
      </div>
    </div>
    <div class="modal-actions">
      <button id="cancelResize">Annuler</button>
      <button class="primary" id="applyResize">Appliquer</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  // ---------- STATE ----------
  let W=32, H=32, zoom=16;
  let layers = []; // {id,name,visible,opacity,canvas,ctx}
  let activeLayerIdx = 0;
  let tool = 'pencil';
  let color = '#e8792c';
  let brushSize = 1;
  let gridOn = true;
  let filled = false;
  let resizeMode = 'stretch';
  let resizeAnchor = 'c';
  let nextLayerId = 1;

  let undoStack = [], redoStack = [];
  const MAX_HISTORY = 30;

  // dragging state
  let isDrawing = false;
  let dragStart = null;
  let strokeSnapshotTaken = false;
  let lastPoint = null;
  let preDragImageData = null; // for shape tools preview

  const compositeCanvas = document.createElement('canvas');
  const compositeCtx = compositeCanvas.getContext('2d');

  const displayCanvas = document.getElementById('displayCanvas');
  const dctx = displayCanvas.getContext('2d');

  // ---------- LAYER HELPERS ----------
  function makeLayer(name){
    const c = document.createElement('canvas');
    c.width = W; c.height = H;
    const ctx = c.getContext('2d');
    return {id: nextLayerId++, name, visible:true, opacity:1, canvas:c, ctx};
  }

  function newDocument(w,h){
    W=w; H=h;
    layers = [makeLayer('Calque 1')];
    activeLayerIdx = 0;
    compositeCanvas.width = W; compositeCanvas.height = H;
    undoStack = []; redoStack = [];
    fitZoom();
    renderLayerList();
    renderAll();
  }

  function activeLayer(){ return layers[activeLayerIdx]; }

  // ---------- HISTORY ----------
  function snapshotState(){
    return {
      W, H,
      layers: layers.map(l=>({
        id:l.id, name:l.name, visible:l.visible, opacity:l.opacity,
        data: l.ctx.getImageData(0,0,W,H)
      })),
      activeLayerIdx
    };
  }
  function restoreState(snap){
    W = snap.W; H = snap.H;
    compositeCanvas.width = W; compositeCanvas.height = H;
    layers = snap.layers.map(l=>{
      const c = document.createElement('canvas'); c.width=W; c.height=H;
      const ctx = c.getContext('2d');
      ctx.putImageData(l.data,0,0);
      return {id:l.id, name:l.name, visible:l.visible, opacity:l.opacity, canvas:c, ctx};
    });
    activeLayerIdx = Math.min(snap.activeLayerIdx, layers.length-1);
    renderLayerList();
    renderAll();
  }
  function pushHistory(){
    undoStack.push(snapshotState());
    if(undoStack.length>MAX_HISTORY) undoStack.shift();
    redoStack = [];
    updateHistoryButtons();
  }
  function undo(){
    if(!undoStack.length) return;
    redoStack.push(snapshotState());
    const snap = undoStack.pop();
    restoreState(snap);
    updateHistoryButtons();
  }
  function redo(){
    if(!redoStack.length) return;
    undoStack.push(snapshotState());
    const snap = redoStack.pop();
    restoreState(snap);
    updateHistoryButtons();
  }
  function updateHistoryButtons(){
    document.getElementById('btnUndo').disabled = undoStack.length===0;
    document.getElementById('btnRedo').disabled = redoStack.length===0;
  }

  // ---------- RENDER ----------
  function composite(){
    compositeCtx.clearRect(0,0,W,H);
    for(const l of layers){
      if(!l.visible) continue;
      compositeCtx.globalAlpha = l.opacity;
      compositeCtx.drawImage(l.canvas,0,0);
    }
    compositeCtx.globalAlpha = 1;
  }

  function renderAll(){
    composite();
    displayCanvas.width = W*zoom;
    displayCanvas.height = H*zoom;
    displayCanvas.style.width = (W*zoom)+'px';
    displayCanvas.style.height = (H*zoom)+'px';
    dctx.imageSmoothingEnabled = false;
    dctx.clearRect(0,0,displayCanvas.width, displayCanvas.height);
    dctx.drawImage(compositeCanvas, 0,0, W*zoom, H*zoom);

    if(gridOn && zoom>=6){
      dctx.strokeStyle = 'rgba(0,0,0,0.25)';
      dctx.lineWidth = 1;
      dctx.beginPath();
      for(let x=0;x<=W;x++){ dctx.moveTo(x*zoom+0.5,0); dctx.lineTo(x*zoom+0.5,H*zoom); }
      for(let y=0;y<=H;y++){ dctx.moveTo(0,y*zoom+0.5); dctx.lineTo(W*zoom,y*zoom+0.5); }
      dctx.stroke();
    }
    document.getElementById('zoomLabel').textContent = Math.round((zoom/16)*100)+'%';
  }

  function fitZoom(){
    const wrap = document.getElementById('canvasWrap');
    const availW = wrap.clientWidth - 60, availH = wrap.clientHeight - 60;
    let z = Math.floor(Math.min(availW/W, availH/H));
    z = Math.max(1, Math.min(z, 64));
    zoom = z;
  }

  // ---------- LAYERS UI ----------
  function renderLayerList(){
    const list = document.getElementById('layerList');
    list.innerHTML = '';
    for(let i=layers.length-1;i>=0;i--){
      const l = layers[i];
      const div = document.createElement('div');
      div.className = 'layer' + (i===activeLayerIdx?' active':'');
      div.addEventListener('click', ()=>{ activeLayerIdx = i; renderLayerList(); });

      const top = document.createElement('div');
      top.className = 'layer-top';

      const thumb = document.createElement('canvas');
      thumb.className = 'layer-thumb';
      thumb.width=30; thumb.height=30;
      const tctx = thumb.getContext('2d');
      tctx.imageSmoothingEnabled=false;
      tctx.drawImage(l.canvas,0,0,30,30);
      top.appendChild(thumb);

      const nameInput = document.createElement('input');
      nameInput.className='layer-name'; nameInput.value = l.name;
      nameInput.addEventListener('click', e=>e.stopPropagation());
      nameInput.addEventListener('change', ()=>{ l.name = nameInput.value; });
      top.appendChild(nameInput);

      const eyeBtn = document.createElement('button');
      eyeBtn.className='eye-btn'; eyeBtn.textContent = l.visible?'👁️':'🚫';
      eyeBtn.addEventListener('click', e=>{ e.stopPropagation(); l.visible=!l.visible; renderLayerList(); renderAll(); });
      top.appendChild(eyeBtn);

      div.appendChild(top);

      const opRow = document.createElement('div');
      opRow.className = 'opacity-row';
      const opInput = document.createElement('input');
      opInput.type='range'; opInput.min=0; opInput.max=100; opInput.value=Math.round(l.opacity*100);
      opInput.addEventListener('click', e=>e.stopPropagation());
      opInput.addEventListener('input', ()=>{ l.opacity = opInput.value/100; opSpan.textContent=opInput.value+'%'; renderAll(); });
      const opSpan = document.createElement('span'); opSpan.textContent = Math.round(l.opacity*100)+'%';
      opRow.appendChild(opInput); opRow.appendChild(opSpan);
      div.appendChild(opRow);

      const actions = document.createElement('div');
      actions.className = 'layer-actions';

      const upBtn = document.createElement('button'); upBtn.textContent='⬆️';
      upBtn.disabled = i===layers.length-1;
      upBtn.addEventListener('click', e=>{ e.stopPropagation(); pushHistory(); moveLayer(i,1); });

      const downBtn = document.createElement('button'); downBtn.textContent='⬇️';
      downBtn.disabled = i===0;
      downBtn.addEventListener('click', e=>{ e.stopPropagation(); pushHistory(); moveLayer(i,-1); });

      const dupBtn = document.createElement('button'); dupBtn.textContent='📋';
      dupBtn.title='Dupliquer';
      dupBtn.addEventListener('click', e=>{ e.stopPropagation(); pushHistory(); duplicateLayer(i); });

      const delBtn = document.createElement('button'); delBtn.textContent='🗑️';
      delBtn.disabled = layers.length===1;
      delBtn.addEventListener('click', e=>{ e.stopPropagation(); if(layers.length>1){ pushHistory(); deleteLayer(i); } });

      actions.appendChild(upBtn); actions.appendChild(downBtn); actions.appendChild(dupBtn); actions.appendChild(delBtn);
      div.appendChild(actions);

      list.appendChild(div);
    }
  }

  function moveLayer(i, dir){
    const j = i+dir;
    if(j<0||j>=layers.length) return;
    [layers[i], layers[j]] = [layers[j], layers[i]];
    if(activeLayerIdx===i) activeLayerIdx=j; else if(activeLayerIdx===j) activeLayerIdx=i;
    renderLayerList(); renderAll();
  }
  function duplicateLayer(i){
    const l = layers[i];
    const nl = makeLayer(l.name+' copie');
    nl.ctx.drawImage(l.canvas,0,0);
    nl.opacity = l.opacity; nl.visible = l.visible;
    layers.splice(i+1,0,nl);
    activeLayerIdx = i+1;
    renderLayerList(); renderAll();
  }
  function deleteLayer(i){
    layers.splice(i,1);
    activeLayerIdx = Math.min(activeLayerIdx, layers.length-1);
    renderLayerList(); renderAll();
  }

  document.getElementById('addLayerBtn').addEventListener('click', ()=>{
    pushHistory();
    const nl = makeLayer('Calque '+nextLayerId);
    layers.splice(activeLayerIdx+1,0,nl);
    activeLayerIdx = activeLayerIdx+1;
    renderLayerList(); renderAll();
  });

  // ---------- PALETTE ----------
  const paletteColors = [
    '#000000','#ffffff','#e8792c','#c1543f','#5fae6b','#3f7fc1',
    '#f4ecd8','#a89e8a','#ffd23f','#ff6b6b','#4ecdc4','#845ec2',
    '#2c2c2c','#7d5a44','#c9a876','#ff9ff3','#54a0ff','#1dd1a1'
  ];
  function renderPalette(){
    const pal = document.getElementById('palette');
    pal.innerHTML='';
    paletteColors.forEach(c=>{
      const sw = document.createElement('div');
      sw.className='swatch'; sw.style.background=c;
      if(c===color) sw.classList.add('selected');
      sw.addEventListener('click', ()=>{ color=c; document.getElementById('colorPicker').value=c; renderPalette(); });
      pal.appendChild(sw);
    });
  }
  renderPalette();
  document.getElementById('colorPicker').addEventListener('input', e=>{ color=e.target.value; renderPalette(); });

  // ---------- TOOLS UI ----------
  document.getElementById('toolGrid').addEventListener('click', e=>{
    const btn = e.target.closest('button[data-tool]');
    if(!btn) return;
    tool = btn.dataset.tool;
    document.querySelectorAll('#toolGrid button').forEach(b=>b.classList.toggle('active', b===btn));
    document.getElementById('filledRow').style.display = (tool==='rect'||tool==='ellipse') ? 'flex' : 'none';
  });
  document.getElementById('filledRow').style.display = 'none';
  document.getElementById('filledCheck').addEventListener('change', e=>{ filled = e.target.checked; });

  document.getElementById('brushSize').addEventListener('input', e=>{
    brushSize = parseInt(e.target.value,10);
    document.getElementById('brushSizeLabel').textContent = brushSize;
  });
  document.getElementById('gridToggle').addEventListener('change', e=>{ gridOn = e.target.checked; renderAll(); });

  // ---------- DRAWING PRIMITIVES ----------
  function drawFootprint(ctx, x, y, size, isErase, col){
    const half = Math.floor(size/2);
    if(isErase){
      ctx.clearRect(x-half, y-half, size, size);
    } else {
      ctx.fillStyle = col;
      ctx.fillRect(x-half, y-half, size, size);
    }
  }

  function linePoints(x0,y0,x1,y1){
    const pts=[];
    let dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    let sx = x0<x1?1:-1, sy = y0<y1?1:-1;
    let err = dx-dy;
    while(true){
      pts.push([x0,y0]);
      if(x0===x1 && y0===y1) break;
      const e2 = 2*err;
      if(e2>-dy){ err-=dy; x0+=sx; }
      if(e2<dx){ err+=dx; y0+=sy; }
    }
    return pts;
  }

  function floodFill(ctx, x, y, fillColHex){
    if(x<0||y<0||x>=W||y>=H) return;
    const img = ctx.getImageData(0,0,W,H);
    const data = img.data;
    const idx = (px,py)=> (py*W+px)*4;
    const startIdx = idx(x,y);
    const target = [data[startIdx],data[startIdx+1],data[startIdx+2],data[startIdx+3]];
    const fill = hexToRgba(fillColHex);
    if(target[0]===fill[0]&&target[1]===fill[1]&&target[2]===fill[2]&&target[3]===fill[3]) return;
    const stack=[[x,y]];
    while(stack.length){
      const [cx,cy] = stack.pop();
      if(cx<0||cy<0||cx>=W||cy>=H) continue;
      const i = idx(cx,cy);
      if(data[i]!==target[0]||data[i+1]!==target[1]||data[i+2]!==target[2]||data[i+3]!==target[3]) continue;
      data[i]=fill[0]; data[i+1]=fill[1]; data[i+2]=fill[2]; data[i+3]=fill[3];
      stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
    }
    ctx.putImageData(img,0,0);
  }

  function hexToRgba(hex){
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return [r,g,b,255];
  }

  function drawRect(ctx, x0,y0,x1,y1, col, isFilled){
    const minX=Math.min(x0,x1), maxX=Math.max(x0,x1);
    const minY=Math.min(y0,y1), maxY=Math.max(y0,y1);
    ctx.fillStyle = col;
    if(isFilled){
      ctx.fillRect(minX,minY,maxX-minX+1,maxY-minY+1);
    } else {
      for(let px=minX;px<=maxX;px++){ ctx.fillRect(px,minY,1,1); ctx.fillRect(px,maxY,1,1); }
      for(let py=minY;py<=maxY;py++){ ctx.fillRect(minX,py,1,1); ctx.fillRect(maxX,py,1,1); }
    }
  }

  function drawEllipse(ctx, x0,y0,x1,y1, col, isFilled){
    const minX=Math.min(x0,x1), maxX=Math.max(x0,x1);
    const minY=Math.min(y0,y1), maxY=Math.max(y0,y1);
    const cx=(minX+maxX)/2, cy=(minY+maxY)/2;
    const rx=(maxX-minX)/2 || 0.5, ry=(maxY-minY)/2 || 0.5;
    ctx.fillStyle = col;
    for(let py=minY; py<=maxY; py++){
      for(let px=minX; px<=maxX; px++){
        const nx=(px+0.5-cx-0.5)/rx, ny=(py+0.5-cy-0.5)/ry;
        const v = nx*nx+ny*ny;
        if(isFilled){ if(v<=1) ctx.fillRect(px,py,1,1); }
        else {
          if(v<=1){
            const nnx=(px+1.5-cx-0.5)/rx, ony=(py+0.5-cy-0.5)/ry;
            const edge = v<=1 && (
              ((px+1+0.5-cx-0.5)/rx)**2 + ony**2 > 1 ||
              ((px-1+0.5-cx-0.5)/rx)**2 + ony**2 > 1 ||
              (nx**2 + ((py+1+0.5-cy-0.5)/ry)**2) > 1 ||
              (nx**2 + ((py-1+0.5-cy-0.5)/ry)**2) > 1
            );
            if(edge) ctx.fillRect(px,py,1,1);
          }
        }
      }
    }
  }

  // ---------- POINTER HANDLING ----------
  function getPixelCoords(e){
    const rect = displayCanvas.getBoundingClientRect();
    const cx = (e.clientX - rect.left) / zoom;
    const cy = (e.clientY - rect.top) / zoom;
    return [Math.floor(cx), Math.floor(cy)];
  }

  displayCanvas.addEventListener('pointerdown', e=>{
    if(e.button!==0) return;
    displayCanvas.setPointerCapture(e.pointerId);
    const [x,y] = getPixelCoords(e);
    if(x<0||y<0||x>=W||y>=H) return;
    isDrawing = true;
    strokeSnapshotTaken = false;
    dragStart = [x,y];
    lastPoint = [x,y];

    if(tool==='eyedropper'){
      composite();
      const px = compositeCtx.getImageData(x,y,1,1).data;
      if(px[3]>0){
        color = '#'+[px[0],px[1],px[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
        document.getElementById('colorPicker').value = color;
        renderPalette();
      }
      isDrawing=false;
      return;
    }

    pushHistory(); strokeSnapshotTaken = true;

    if(tool==='pencil' || tool==='eraser'){
      drawFootprint(activeLayer().ctx, x, y, brushSize, tool==='eraser', color);
      renderAll();
    } else if(tool==='bucket'){
      floodFill(activeLayer().ctx, x, y, color);
      renderAll();
      isDrawing=false;
    } else if(tool==='line'||tool==='rect'||tool==='ellipse'){
      preDragImageData = activeLayer().ctx.getImageData(0,0,W,H);
    }
  });

  displayCanvas.addEventListener('pointermove', e=>{
    if(!isDrawing) return;
    const [x,y] = getPixelCoords(e);
    const cx = Math.max(0,Math.min(W-1,x)), cy = Math.max(0,Math.min(H-1,y));

    if(tool==='pencil'||tool==='eraser'){
      const pts = linePoints(lastPoint[0], lastPoint[1], cx, cy);
      for(const [px,py] of pts) drawFootprint(activeLayer().ctx, px, py, brushSize, tool==='eraser', color);
      lastPoint = [cx,cy];
      renderAll();
    } else if(tool==='line'){
      activeLayer().ctx.putImageData(preDragImageData,0,0);
      const pts = linePoints(dragStart[0],dragStart[1],cx,cy);
      activeLayer().ctx.fillStyle = color;
      for(const [px,py] of pts) activeLayer().ctx.fillRect(px,py,1,1);
      renderAll();
    } else if(tool==='rect'){
      activeLayer().ctx.putImageData(preDragImageData,0,0);
      drawRect(activeLayer().ctx, dragStart[0],dragStart[1], cx,cy, color, filled);
      renderAll();
    } else if(tool==='ellipse'){
      activeLayer().ctx.putImageData(preDragImageData,0,0);
      drawEllipse(activeLayer().ctx, dragStart[0],dragStart[1], cx,cy, color, filled);
      renderAll();
    }
  });

  window.addEventListener('pointerup', ()=>{
    if(!isDrawing) return;
    isDrawing=false;
    renderLayerList();
    if(strokeSnapshotTaken){
      // check if anything actually changed; if not, drop the useless history entry
    }
  });

  // ---------- ZOOM ----------
  function setZoom(z){ zoom = Math.max(1, Math.min(64, z)); renderAll(); }
  document.getElementById('zoomIn').addEventListener('click', ()=> setZoom(zoom+ (zoom<4?1:Math.ceil(zoom*0.5))));
  document.getElementById('zoomOut').addEventListener('click', ()=> setZoom(zoom- (zoom<=4?1:Math.ceil(zoom*0.33))));
  document.getElementById('zoomFit').addEventListener('click', ()=>{ fitZoom(); renderAll(); });

  // ---------- UNDO/REDO BUTTONS ----------
  document.getElementById('btnUndo').addEventListener('click', undo);
  document.getElementById('btnRedo').addEventListener('click', redo);
  window.addEventListener('keydown', e=>{
    if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='z' && !e.shiftKey){ e.preventDefault(); undo(); }
    else if((e.ctrlKey||e.metaKey) && (e.key.toLowerCase()==='y' || (e.key.toLowerCase()==='z'&&e.shiftKey))){ e.preventDefault(); redo(); }
    else if(!e.ctrlKey && !e.metaKey){
      const map = {b:'pencil', e:'eraser', g:'bucket', i:'eyedropper', l:'line', r:'rect', o:'ellipse'};
      const t = map[e.key.toLowerCase()];
      if(t){
        tool = t;
        document.querySelectorAll('#toolGrid button').forEach(b=>b.classList.toggle('active', b.dataset.tool===t));
        document.getElementById('filledRow').style.display = (t==='rect'||t==='ellipse') ? 'flex' : 'none';
      }
    }
  });

  // ---------- NEW CANVAS MODAL ----------
  const newModal = document.getElementById('newModal');
  document.getElementById('newPresets').addEventListener('click', e=>{
    const btn = e.target.closest('button[data-w]');
    if(!btn) return;
    document.getElementById('newW').value = btn.dataset.w;
    document.getElementById('newH').value = btn.dataset.h;
  });
  document.getElementById('createCanvasBtn').addEventListener('click', ()=>{
    const w = Math.max(1, Math.min(1024, parseInt(document.getElementById('newW').value,10)||32));
    const h = Math.max(1, Math.min(1024, parseInt(document.getElementById('newH').value,10)||32));
    newDocument(w,h);
    newModal.classList.add('hidden');
  });
  document.getElementById('btnNew').addEventListener('click', ()=>{
    document.getElementById('newW').value = W;
    document.getElementById('newH').value = H;
    newModal.classList.remove('hidden');
  });

  // ---------- RESIZE MODAL ----------
  const resizeModal = document.getElementById('resizeModal');
  document.getElementById('btnResize').addEventListener('click', ()=>{
    document.getElementById('resizeW').value = W;
    document.getElementById('resizeH').value = H;
    resizeModal.classList.remove('hidden');
  });
  document.getElementById('cancelResize').addEventListener('click', ()=> resizeModal.classList.add('hidden'));
  document.getElementById('modeStretch').addEventListener('click', ()=>{
    resizeMode='stretch';
    document.getElementById('modeStretch').classList.add('active');
    document.getElementById('modeCrop').classList.remove('active');
    document.getElementById('anchorWrap').classList.add('hidden');
  });
  document.getElementById('modeCrop').addEventListener('click', ()=>{
    resizeMode='crop';
    document.getElementById('modeCrop').classList.add('active');
    document.getElementById('modeStretch').classList.remove('active');
    document.getElementById('anchorWrap').classList.remove('hidden');
  });
  document.getElementById('anchorGrid').addEventListener('click', e=>{
    const btn = e.target.closest('button[data-a]');
    if(!btn) return;
    resizeAnchor = btn.dataset.a;
    document.querySelectorAll('#anchorGrid button').forEach(b=>b.classList.toggle('active', b===btn));
  });
  document.getElementById('applyResize').addEventListener('click', ()=>{
    const newW = Math.max(1, Math.min(1024, parseInt(document.getElementById('resizeW').value,10)||W));
    const newH = Math.max(1, Math.min(1024, parseInt(document.getElementById('resizeH').value,10)||H));
    pushHistory();
    applyResize(newW,newH,resizeMode,resizeAnchor);
    resizeModal.classList.add('hidden');
  });

  function applyResize(newW,newH,mode,anchor){
    const oldW=W, oldH=H;
    layers.forEach(l=>{
      const nc = document.createElement('canvas'); nc.width=newW; nc.height=newH;
      const nctx = nc.getContext('2d');
      if(mode==='stretch'){
        nctx.imageSmoothingEnabled=false;
        nctx.drawImage(l.canvas, 0,0,oldW,oldH, 0,0,newW,newH);
      } else {
        let ox=0, oy=0;
        const dw = newW-oldW, dh = newH-oldH;
        if(anchor.includes('w')) ox=0; else if(anchor.includes('e')) ox=dw; else ox=Math.round(dw/2);
        if(anchor.includes('n')) oy=0; else if(anchor.includes('s')) oy=dh; else oy=Math.round(dh/2);
        nctx.drawImage(l.canvas,0,0,oldW,oldH, ox,oy,oldW,oldH);
      }
      l.canvas = nc; l.ctx = nctx;
    });
    W=newW; H=newH;
    compositeCanvas.width=W; compositeCanvas.height=H;
    fitZoom();
    renderLayerList(); renderAll();
  }

  // ---------- IMPORT IMAGE ----------
  const fileInput = document.getElementById('fileInput');
  document.getElementById('btnImport').addEventListener('click', ()=> fileInput.click());
  fileInput.addEventListener('change', e=>{
    const file = e.target.files[0];
    if(!file) return;
    const img = new Image();
    img.onload = ()=>{
      pushHistory();
      const nl = makeLayer(file.name.replace(/\.[^.]+$/,'') || 'Image');
      nl.ctx.imageSmoothingEnabled = false;
      // contain, centré
      const scale = Math.min(W/img.width, H/img.height);
      const dw = img.width*scale, dh = img.height*scale;
      const dx = (W-dw)/2, dy = (H-dh)/2;
      nl.ctx.drawImage(img, dx, dy, dw, dh);
      layers.splice(activeLayerIdx+1,0,nl);
      activeLayerIdx = activeLayerIdx+1;
      renderLayerList(); renderAll();
    };
    img.src = URL.createObjectURL(file);
    fileInput.value='';
  });

  // ---------- EXPORT ----------
  document.getElementById('btnExport').addEventListener('click', ()=>{
    const scale = parseInt(document.getElementById('exportScale').value,10);
    composite();
    const out = document.createElement('canvas');
    out.width = W*scale; out.height = H*scale;
    const octx = out.getContext('2d');
    octx.imageSmoothingEnabled = false;
    octx.drawImage(compositeCanvas,0,0,W*scale,H*scale);
    out.toBlob(blob=>{
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'pixel-art.png';
      a.click();
    });
  });

  // ---------- INIT ----------
  window.addEventListener('resize', ()=>{ fitZoom(); renderAll(); });
  newDocument(32,32);
  updateHistoryButtons();

})();
</script>
</body>
</html>
